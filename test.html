<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCN Appeal Generator - Local Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-blue-800 text-white py-6 shadow-lg">
        <div class="container mx-auto px-4">
            <h1 class="text-2xl md:text-3xl font-bold">PCN Appeal Generator</h1>
            <p class="text-blue-200 text-sm mt-1">Local Test Mode - No Firebase Required</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-2xl">
        <div class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded mb-6">
            <p class="font-bold">⚠️ Test Mode</p>
            <p class="text-sm">This is a local test version. No data is saved. PDF generation works without payment.</p>
        </div>

        <section class="bg-white rounded-xl shadow-md p-6 md:p-8">
            <h2 class="text-xl font-bold text-gray-800 mb-6">Enter Your PCN Details</h2>
            
            <form id="test-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">PCN Reference</label>
                    <input type="text" id="pcnRef" value="TEST123456" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Vehicle Registration</label>
                    <input type="text" id="vehicleReg" value="AB12CDE" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg uppercase">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Council</label>
                    <input type="text" id="council" value="Test Council" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contravention Code</label>
                    <select id="contraventionCode" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        <option value="01">01 - Parked in a restricted street</option>
                        <option value="02">02 - Parked in a loading restricted street</option>
                        <option value="11">11 - Parked without payment</option>
                        <option value="12">12 - No permit in residents' bay</option>
                        <option value="16">16 - No permit in permit space</option>
                        <option value="21">21 - Parked in suspended bay</option>
                        <option value="25">25 - Parked in loading place</option>
                        <option value="30">30 - Parked longer than permitted</option>
                        <option value="31">31 - Stopped in box junction</option>
                        <option value="34">34 - Being in a bus lane</option>
                        <option value="47">47 - Stopped on a restricted bus stop</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                        <input type="date" id="contraventionDate" value="2026-03-15" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Time</label>
                        <input type="time" id="contraventionTime" value="14:30" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                    <input type="text" id="location" value="123 Test Street, Manchester" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Circumstances</label>
                    <textarea id="circumstances" rows="3" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg">I was loading goods into my property and the restriction signs were not clearly visible.</textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                    <input type="text" id="applicantName" value="John Smith" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>

                <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200">
                    Generate Test PDF
                </button>
            </form>
        </section>
    </main>

    <!-- Load templates and PDF generator -->
    <script src="js/templates.js"></script>
    <script src="js/pdf-generator.js"></script>
    
    <script>
        // Mock Firebase for local testing
        window.db = { collection: () => ({}) };
        window.firebase = { firestore: { FieldValue: { serverTimestamp: () => new Date() } } };

        document.getElementById('test-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const formData = {
                pcnRef: document.getElementById('pcnRef').value,
                vehicleReg: document.getElementById('vehicleReg').value,
                council: document.getElementById('council').value,
                contraventionCode: document.getElementById('contraventionCode').value,
                contraventionDate: document.getElementById('contraventionDate').value,
                contraventionTime: document.getElementById('contraventionTime').value,
                location: document.getElementById('location').value,
                circumstances: document.getElementById('circumstances').value,
                applicantName: document.getElementById('applicantName').value
            };
            
            PDFGenerator.download(formData);
        });
    </script>
</body>
</html>
