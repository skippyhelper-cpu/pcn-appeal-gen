<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Your Appeal Letter - PCN Appeal Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Times+New+Roman&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        .letter-content {
            font-family: 'Times New Roman', serif;
            line-height: 1.8;
        }
        
        /* Watermark overlay */
        .watermark-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 10;
        }
        
        .watermark-text {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: rgba(220, 38, 38, 0.15);
            transform: rotate(-30deg);
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* Disable text selection */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        
        /* Disable printing */
        @media print {
            body { display: none !important; }
        }
        
        /* Blur effect for sensitive sections */
        .blur-sensitive {
            filter: blur(4px);
            transition: filter 0.3s;
        }
        
        .blur-sensitive:hover {
            filter: blur(2px);
        }
        
        /* Glass effect */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        /* Progress stepper */
        .step-active { background: #2563eb; color: white; }
        .step-complete { background: #22c55e; color: white; }
        .step-pending { background: #e5e7eb; color: #6b7280; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen" oncontextmenu="return false;">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="/" class="text-xl font-bold text-blue-600">PCN Appeal Generator</a>
                <a href="app.html" class="text-gray-600 hover:text-gray-900">← Back to Form</a>
            </div>
        </div>
    </nav>

    <!-- Progress Stepper -->
    <div class="bg-white border-b">
        <div class="max-w-3xl mx-auto px-4 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full step-complete flex items-center justify-center font-semibold">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                        </svg>
                    </div>
                    <span class="ml-3 text-sm font-medium text-gray-900">Details</span>
                </div>
                
                <div class="flex-1 mx-4 h-1 bg-green-500 rounded"></div>
                
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full step-active flex items-center justify-center font-semibold">2</div>
                    <span class="ml-3 text-sm font-medium text-blue-600">Preview</span>
                </div>
                
                <div class="flex-1 mx-4 h-1 bg-gray-200 rounded"></div>
                
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full step-pending flex items-center justify-center font-semibold">3</div>
                    <span class="ml-3 text-sm font-medium text-gray-500">Payment</span>
                </div>
                
                <div class="flex-1 mx-4 h-1 bg-gray-200 rounded"></div>
                
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full step-pending flex items-center justify-center font-semibold">4</div>
                    <span class="ml-3 text-sm font-medium text-gray-500">Download</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <!-- Notice Banner -->
        <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-6 flex items-start gap-3">
            <svg class="w-5 h-5 text-yellow-600 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
            </svg>
            <div>
                <p class="text-yellow-800 font-medium">This is a preview only</p>
                <p class="text-yellow-700 text-sm">Complete payment to download the full letter without watermark. The final PDF will be clean and ready to submit.</p>
            </div>
        </div>

        <!-- Letter Preview Container -->
        <div class="bg-white rounded-xl shadow-lg overflow-hidden relative">
            <!-- Watermark Overlay -->
            <div class="watermark-overlay" id="watermarkOverlay">
                <!-- Watermarks will be generated by JS -->
            </div>
            
            <!-- Letter Content -->
            <div class="p-8 md:p-12 no-select" id="letterContent">
                <!-- Content will be populated by JS -->
                <div class="text-center py-20 text-gray-500">
                    <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <p>No preview data available.</p>
                    <a href="app.html" class="text-blue-600 hover:underline mt-2 inline-block">Start your appeal</a>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-center">
            <a href="app.html" class="px-8 py-3 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition-colors text-center">
                ← Edit Details
            </a>
            <button id="proceedToPayment" class="px-8 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition-colors shadow-lg shadow-blue-600/30 flex items-center justify-center gap-2">
                <span>Get Full Letter — £2.99</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
                </svg>
            </button>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/templates.js"></script>

    <script>
        // Disable keyboard shortcuts for copying
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'p' || e.key === 's')) {
                e.preventDefault();
                return false;
            }
        });

        // Generate watermark pattern
        function generateWatermarks() {
            const container = document.getElementById('watermarkOverlay');
            const texts = ['PREVIEW ONLY', 'NOT FOR SUBMISSION', 'WATERMARK'];
            
            for (let row = 0; row < 15; row++) {
                for (let col = 0; col < 5; col++) {
                    const span = document.createElement('span');
                    span.className = 'watermark-text';
                    span.textContent = texts[(row + col) % texts.length];
                    span.style.top = `${row * 100 + (col % 2) * 50}px`;
                    span.style.left = `${col * 300 - 100}px`;
                    container.appendChild(span);
                }
            }
        }

        // Get appeal data from URL or sessionStorage
        function getAppealData() {
            // Try URL parameters first
            const urlParams = new URLSearchParams(window.location.search);
            const appealId = urlParams.get('appeal');
            
            // Try sessionStorage
            const storedData = sessionStorage.getItem('appealPreviewData');
            
            if (storedData) {
                return JSON.parse(storedData);
            }
            
            return null;
        }

        // Render letter preview
        function renderPreview(data) {
            if (!data) return;
            
            const template = getTemplate(data.contraventionCode, data.country || 'england');
            const htmlContent = template.generate(data);
            
            document.getElementById('letterContent').innerHTML = htmlContent;
        }

        // Handle proceed to payment
        document.getElementById('proceedToPayment').addEventListener('click', async function() {
            const data = getAppealData();
            
            if (!data) {
                alert('No appeal data found. Please start again.');
                window.location.href = 'app.html';
                return;
            }
            
            // Store data for payment flow
            sessionStorage.setItem('appealPaymentData', JSON.stringify(data));
            
            // Redirect to payment
            window.location.href = 'payment.html';
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            generateWatermarks();
            const data = getAppealData();
            if (data) {
                renderPreview(data);
            }
        });
    </script>
</body>
</html>
